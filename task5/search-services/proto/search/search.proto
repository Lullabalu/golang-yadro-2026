syntax = "proto3";

package search;

import "google/protobuf/empty.proto";

option go_package = "yadro.com/course/proto/search";

service SearchService {
  rpc Search(SearchComicsRequest) returns (SearchComicsResponse) {}
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty) {}
}

message SearchComicsRequest {
  string phrase = 1;
  uint32 limit = 2;
}

message SearchComic {
  uint64 id = 1;
  string url = 2;
}

message SearchComicsResponse {
  repeated SearchComic comics = 1;
  uint32 total = 2;
}

